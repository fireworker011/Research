  <path d="M 584 426 C 602 420 628 420 646 428" stroke="#3B3129" stroke-width="10" stroke-linecap="round" fill="none"/>

  <!-- シンプルな眼鏡 -->
  <g stroke="#2E3A4E" stroke-width="10" fill="none">
    <rect x="418" y="452" width="112" height="86" rx="26"/>
    <rect x="550" y="452" width="112" height="86" rx="26"/>
    <path d="M 530 486 C 534 480 546 480 550 486"/>
    <path d="M 418 486 L 380 476"/>
    <path d="M 662 486 L 700 476"/>
