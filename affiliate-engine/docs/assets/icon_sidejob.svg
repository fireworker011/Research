  <path d="M 442 472 L 470 528" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round" opacity="0.25"/>
  <path d="M 574 472 L 602 528" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round" opacity="0.25"/>

  <!-- 目（穏やか・眼鏡の中） -->
  <circle cx="474" cy="498" r="13" fill="#33302C"/>
  <circle cx="606" cy="498" r="13" fill="#33302C"/>

  <!-- 鼻・口（落ち着いた微笑） -->
  <path d="M 536 546 C 540 552 544 552 548 546" stroke="#D6A177" stroke-width="7" stroke-linecap="round" fill="none"/>
  <path d="M 512 588 C 528 600 552 600 568 588" stroke="#B57A5C" stroke-width="9" stroke-linecap="round" fill="none"/>

  <!-- ノートPC（手前・下部） -->
