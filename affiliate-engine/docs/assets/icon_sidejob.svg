    <path d="M 268 1010 L 812 1010 L 820 1026 L 260 1026 Z" fill="#4E5C74"/>
  </g>

  <!-- コーヒーカップ（右） -->
  <g>
    <ellipse cx="884" cy="1006" rx="64" ry="14" fill="#141E33" opacity="0.5"/>
    <path d="M 830 902 L 842 1000 C 843 1010 925 1010 926 1000 L 938 902 Z" fill="#EDE6DA"/>
