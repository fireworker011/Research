    <!-- 画面（背面が見えている） -->
    <path d="M 330 892 L 750 892 C 762 892 770 900 770 912 L 770 1010 L 310 1010 L 310 912 C 310 900 318 892 330 892 Z" fill="#46536B"/>
    <rect x="330" y="908" width="420" height="86" rx="8" fill="#54627C"/>
