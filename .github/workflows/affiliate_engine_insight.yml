name: Affiliate Engine インサイト（市場リサーチ×実測分析）

on:
  schedule:
    - cron: '0 21 */3 * *'   # 06:00 JST、3日ごと
  workflow_dispatch:

jobs:
  insight:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          ref: claude/monthly-revenue-system-gvi02u
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 最新メトリクス収集
        env:
          THREADS_KONKATSU_USER_ID: ${{ secrets.THREADS_KONKATSU_USER_ID }}
          THREADS_KONKATSU_ACCESS_TOKEN: ${{ secrets.THREADS_KONKATSU_ACCESS_TOKEN }}
          THREADS_SIDEJOB_USER_ID: ${{ secrets.THREADS_SIDEJOB_USER_ID }}
          THREADS_SIDEJOB_ACCESS_TOKEN: ${{ secrets.THREADS_SIDEJOB_ACCESS_TOKEN }}
          THREADS_BEAUTY_USER_ID: ${{ secrets.THREADS_BEAUTY_USER_ID }}
          THREADS_BEAUTY_ACCESS_TOKEN: ${{ secrets.THREADS_BEAUTY_ACCESS_TOKEN }}
          THREADS_BODYMAKE_USER_ID: ${{ secrets.THREADS_BODYMAKE_USER_ID }}
          THREADS_BODYMAKE_ACCESS_TOKEN: ${{ secrets.THREADS_BODYMAKE_ACCESS_TOKEN }}
          THREADS_EDUCATION_USER_ID: ${{ secrets.THREADS_EDUCATION_USER_ID }}
          THREADS_EDUCATION_ACCESS_TOKEN: ${{ secrets.THREADS_EDUCATION_ACCESS_TOKEN }}
        run: |
          cd affiliate-engine
          node src/report.js

      - name: インサイト生成（Web検索リサーチ）
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          cd affiliate-engine
          node src/insight.js

      - name: レポートと草案を保存
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add affiliate-engine/output affiliate-engine/data/proposed_templates.json || true
          git diff --staged --quiet || {
            git commit -m "chore: インサイトレポート更新（市場リサーチ×実測）"
            git pull --rebase origin claude/monthly-revenue-system-gvi02u
            git push origin claude/monthly-revenue-system-gvi02u
          }
