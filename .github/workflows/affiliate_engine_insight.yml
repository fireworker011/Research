name: Affiliate Engine デイリー自動改善（分析→リサーチ→反映→エンゲージ素材）

on:
  schedule:
    # GitHub の schedule は混雑で1〜4時間遅延・稀にスキップされるため、
    # 1日2ティック（05:37 / 08:07 JST）用意し、各ステップの冪等ガードで
    # 「その日すでに生成済みなら何もしない」ようにして二重実行を防ぐ
    - cron: '37 20 * * *'
    - cron: '7 23 * * *'
  workflow_dispatch:

concurrency:
  group: affiliate-daily-improve
  cancel-in-progress: false

jobs:
  daily-improve:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          ref: claude/monthly-revenue-system-gvi02u
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 実行済みチェック（冪等ガード）
        id: guard
        run: |
          TODAY=$(TZ=Asia/Tokyo date +%F)
          echo "today=${TODAY}" >> "$GITHUB_OUTPUT"
          if [ -f "affiliate-engine/output/insights/insight_${TODAY}.md" ] && [ -f "affiliate-engine/output/engage/engage_${TODAY}.md" ]; then
            echo "done=true" >> "$GITHUB_OUTPUT"
            echo "本日分（${TODAY}）は生成済み。以降のステップをスキップします"
          else
            echo "done=false" >> "$GITHUB_OUTPUT"
          fi

      - name: 最新メトリクス収集
        if: steps.guard.outputs.done != 'true'
        env:
          THREADS_KONKATSU_USER_ID: ${{ secrets.THREADS_KONKATSU_USER_ID }}
          THREADS_KONKATSU_ACCESS_TOKEN: ${{ secrets.THREADS_KONKATSU_ACCESS_TOKEN }}
          THREADS_SIDEJOB_USER_ID: ${{ secrets.THREADS_SIDEJOB_USER_ID }}
          THREADS_SIDEJOB_ACCESS_TOKEN: ${{ secrets.THREADS_SIDEJOB_ACCESS_TOKEN }}
          THREADS_BEAUTY_USER_ID: ${{ secrets.THREADS_BEAUTY_USER_ID }}
          THREADS_BEAUTY_ACCESS_TOKEN: ${{ secrets.THREADS_BEAUTY_ACCESS_TOKEN }}
          THREADS_BODYMAKE_USER_ID: ${{ secrets.THREADS_BODYMAKE_USER_ID }}
          THREADS_BODYMAKE_ACCESS_TOKEN: ${{ secrets.THREADS_BODYMAKE_ACCESS_TOKEN }}
          THREADS_EDUCATION_USER_ID: ${{ secrets.THREADS_EDUCATION_USER_ID }}
          THREADS_EDUCATION_ACCESS_TOKEN: ${{ secrets.THREADS_EDUCATION_ACCESS_TOKEN }}
          THREADS_SETSUYAKU_USER_ID: ${{ secrets.THREADS_SETSUYAKU_USER_ID }}
          THREADS_SETSUYAKU_ACCESS_TOKEN: ${{ secrets.THREADS_SETSUYAKU_ACCESS_TOKEN }}
          THREADS_TENSHOKU_USER_ID: ${{ secrets.THREADS_TENSHOKU_USER_ID }}
          THREADS_TENSHOKU_ACCESS_TOKEN: ${{ secrets.THREADS_TENSHOKU_ACCESS_TOKEN }}
          THREADS_PET_USER_ID: ${{ secrets.THREADS_PET_USER_ID }}
          THREADS_PET_ACCESS_TOKEN: ${{ secrets.THREADS_PET_ACCESS_TOKEN }}
          THREADS_SLEEP_USER_ID: ${{ secrets.THREADS_SLEEP_USER_ID }}
          THREADS_SLEEP_ACCESS_TOKEN: ${{ secrets.THREADS_SLEEP_ACCESS_TOKEN }}
        run: |
          cd affiliate-engine
          node src/report.js

      - name: インサイト生成（Web検索リサーチ）
        if: steps.guard.outputs.done != 'true'
        continue-on-error: true   # 失敗しても後続のエンゲージ素材生成は実行する
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          cd affiliate-engine
          if [ -f "output/insights/insight_${{ steps.guard.outputs.today }}.md" ]; then
            echo "本日分のインサイトは生成済み（スキップ）"
          else
            node src/insight.js
          fi

      - name: 草案の自動反映とスケジュール再生成
        if: steps.guard.outputs.done != 'true'
        continue-on-error: true
        run: |
          cd affiliate-engine
          if node -e "const p=require('./data/proposed_templates.json'); process.exit((p.posting_templates||[]).length ? 0 : 1)" 2>/dev/null; then
            node src/apply-proposals.js --auto --prune 3 --cap 36
          else
            echo "反映すべき草案なし（スキップ）"
          fi

      - name: エンゲージメント・キット生成（返信/コメント下書き）
        if: steps.guard.outputs.done != 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          THREADS_KONKATSU_USER_ID: ${{ secrets.THREADS_KONKATSU_USER_ID }}
          THREADS_KONKATSU_ACCESS_TOKEN: ${{ secrets.THREADS_KONKATSU_ACCESS_TOKEN }}
          THREADS_SIDEJOB_USER_ID: ${{ secrets.THREADS_SIDEJOB_USER_ID }}
          THREADS_SIDEJOB_ACCESS_TOKEN: ${{ secrets.THREADS_SIDEJOB_ACCESS_TOKEN }}
          THREADS_BEAUTY_USER_ID: ${{ secrets.THREADS_BEAUTY_USER_ID }}
          THREADS_BEAUTY_ACCESS_TOKEN: ${{ secrets.THREADS_BEAUTY_ACCESS_TOKEN }}
          THREADS_BODYMAKE_USER_ID: ${{ secrets.THREADS_BODYMAKE_USER_ID }}
          THREADS_BODYMAKE_ACCESS_TOKEN: ${{ secrets.THREADS_BODYMAKE_ACCESS_TOKEN }}
          THREADS_EDUCATION_USER_ID: ${{ secrets.THREADS_EDUCATION_USER_ID }}
          THREADS_EDUCATION_ACCESS_TOKEN: ${{ secrets.THREADS_EDUCATION_ACCESS_TOKEN }}
          THREADS_SETSUYAKU_USER_ID: ${{ secrets.THREADS_SETSUYAKU_USER_ID }}
          THREADS_SETSUYAKU_ACCESS_TOKEN: ${{ secrets.THREADS_SETSUYAKU_ACCESS_TOKEN }}
          THREADS_TENSHOKU_USER_ID: ${{ secrets.THREADS_TENSHOKU_USER_ID }}
          THREADS_TENSHOKU_ACCESS_TOKEN: ${{ secrets.THREADS_TENSHOKU_ACCESS_TOKEN }}
          THREADS_PET_USER_ID: ${{ secrets.THREADS_PET_USER_ID }}
          THREADS_PET_ACCESS_TOKEN: ${{ secrets.THREADS_PET_ACCESS_TOKEN }}
          THREADS_SLEEP_USER_ID: ${{ secrets.THREADS_SLEEP_USER_ID }}
          THREADS_SLEEP_ACCESS_TOKEN: ${{ secrets.THREADS_SLEEP_ACCESS_TOKEN }}
        run: |
          cd affiliate-engine
          if [ -f "output/engage/engage_${{ steps.guard.outputs.today }}.md" ]; then
            echo "本日分のエンゲージキットは生成済み（スキップ）"
          else
            node src/engage.js
          fi

      - name: 成果物をコミット
        if: steps.guard.outputs.done != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add affiliate-engine/output affiliate-engine/data || true
          git diff --staged --quiet || {
            git commit -m "chore: デイリー自動改善（テンプレ反映・スケジュール更新・エンゲージ素材）"
            git pull --rebase origin claude/monthly-revenue-system-gvi02u
            git push origin claude/monthly-revenue-system-gvi02u
          }
