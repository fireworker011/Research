name: 婚活Shorts 動画生成→YouTube投稿

on:
  workflow_dispatch:
    inputs:
      script:
        description: '台本JSON名 (例: 003_ng5sen)'
        required: true
        default: '003_ng5sen'
      privacy:
        description: '公開設定 (private=スマホで確認後に手動公開 / public=即公開)'
        required: true
        default: 'private'
        type: choice
        options:
          - private
          - public

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: リポジトリを取得
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Python セットアップ
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5.3.0
        with:
          python-version: '3.11'

      - name: FFmpeg インストール
        run: sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg

      - name: 依存関係インストール
        run: pip install -q -r "shorts/pc/06_婚活/pipeline/requirements.txt"

      - name: 動画生成 → YouTube投稿
        env:
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
        run: |
          cd "shorts/pc/06_婚活/pipeline"
          FLAG="--upload"
          if [ "${{ inputs.privacy }}" = "public" ]; then FLAG="--upload --public"; fi
          python run.py "scripts_json/${{ inputs.script }}.json" $FLAG

      - name: 完成動画をアーティファクトとして保存(バックアップ)
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882  # v4.4.3
        if: always()
        with:
          name: video-${{ inputs.script }}
          path: shorts/pc/06_婚活/pipeline/output/**/*_final.mp4
          if-no-files-found: ignore
          retention-days: 7
