name: Threads トークン 月次リフレッシュ（5アカウント）

on:
  schedule:
    - cron: '0 0 1 * *'    # 毎月 1日 00:00 UTC (09:00 JST)
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          ref: claude/monthly-revenue-system-gvi02u
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: トークンリフレッシュ（5アカウント）
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          THREADS_KONKATSU_ACCESS_TOKEN: ${{ secrets.THREADS_KONKATSU_ACCESS_TOKEN }}
          THREADS_SIDEJOB_ACCESS_TOKEN: ${{ secrets.THREADS_SIDEJOB_ACCESS_TOKEN }}
          THREADS_BEAUTY_ACCESS_TOKEN: ${{ secrets.THREADS_BEAUTY_ACCESS_TOKEN }}
          THREADS_BODYMAKE_ACCESS_TOKEN: ${{ secrets.THREADS_BODYMAKE_ACCESS_TOKEN }}
          THREADS_EDUCATION_ACCESS_TOKEN: ${{ secrets.THREADS_EDUCATION_ACCESS_TOKEN }}
        run: |
          cd affiliate-engine
          node src/refresh-tokens.js
